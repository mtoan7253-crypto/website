<!DOCTYPE html>
<html>
<head>
    <title>Game Xếp Hình Đơn Giản</title>
    <style>
        body { background: #202028; color: #fff; font-family: sans-serif; text-align: center; }
        canvas { border: solid 2px #fff; background-color: #000; height: 80vh; }
        .score { font-size: 30px; }
    </style>
</head>
<body>
    <div class="score" id="score">Điểm: 0</div>
    <canvas id="tetris" width="240" height="400"></canvas>

    <script>
        const canvas = document.getElementById('tetris');
        const context = canvas.getContext('2d');
        context.scale(20, 20);

        // Tạo bảng game (12x20)
        function createMatrix(w, h) {
            const matrix = [];
            while (h--) { matrix.push(new Array(w).fill(0)); }
            return matrix;
        }

        // Vẽ các khối gạch
        function drawMatrix(matrix, offset) {
            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        context.fillStyle = 'red';
                        context.fillRect(x + offset.x, y + offset.y, 1, 1);
                    }
                });
            });
        }

        // Khối gạch hình chữ T đơn giản
        const player = {
            pos: {x: 5, y: 0},
            matrix: [
                [0, 1, 0],
                [1, 1, 1],
                [0, 0, 0],
            ],
        };

        const arena = createMatrix(12, 20);

        function draw() {
            context.fillStyle = '#000';
            context.fillRect(0, 0, canvas.width, canvas.height);
            drawMatrix(arena, {x: 0, y: 0});
            drawMatrix(player.matrix, player.pos);
        }

        let dropCounter = 0;
        let lastTime = 0;
        function update(time = 0) {
            const deltaTime = time - lastTime;
            lastTime = time;
            dropCounter += deltaTime;
            if (dropCounter > 1000) {
                player.pos.y++;
                dropCounter = 0;
            }
            draw();
            requestAnimationFrame(update);
        }

        // Điều khiển bằng phím mũi tên
        document.addEventListener('keydown', event => {
            if (event.keyCode === 37) player.pos.x--; // Trái
            else if (event.keyCode === 39) player.pos.x++; // Phải
            else if (event.keyCode === 40) player.pos.y++; // Xuống
        });

        update();
    </script>
</body>
</html>
